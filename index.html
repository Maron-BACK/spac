17", "estimated_liquidation_date": "2029-01-30", "days_until_liquidation": 979, "offering_price": 2000.0, "current_price": 2005.0, "rate_y1": 2.38, "rate_y2": 2.38, "rate_y3": 2.38, "liquidation_value": 2119.0, "total_return_pct": 5.69, "annualized_return_pct": 2.08, "rate_source": "KSFC"}, {"ticker": "0130D0", "name": "신한제17호스팩", "payment_date": "2026-03-19", "estimated_liquidation_date": "2029-02-01", "days_until_liquidation": 981, "offering_price": 2000.0, "current_price": 1992.0, "rate_y1": 2.38, "rate_y2": 2.38, "rate_y3": 2.38, "liquidation_value": 2119.0, "total_return_pct": 6.38, "annualized_return_pct": 2.33, "rate_source": "KSFC"}, {"ticker": "0132G0", "name": "교보20호스팩", "payment_date": "2026-03-23", "estimated_liquidation_date": "2029-02-05", "days_until_liquidation": 985, "offering_price": 2000.0, "current_price": 1995.0, "rate_y1": 2.38, "rate_y2": 2.38, "rate_y3": 2.38, "liquidation_value": 2119.0, "total_return_pct": 6.22, "annualized_return_pct": 2.26, "rate_source": "KSFC"}, {"ticker": "0131D0", "name": "키움히어로제2호스팩", "payment_date": "2026-04-14", "estimated_liquidation_date": "2029-02-27", "days_until_liquidation": 1007, "offering_price": 2000.0, "current_price": 1981.0, "rate_y1": 2.38, "rate_y2": 2.38, "rate_y3": 2.38, "liquidation_value": 2119.0, "total_return_pct": 6.97, "annualized_return_pct": 2.47, "rate_source": "KSFC"}, {"ticker": "0129K0", "name": "신한제18호스팩", "payment_date": "2026-04-20", "estimated_liquidation_date": "2029-03-05", "days_until_liquidation": 1013, "offering_price": 2000.0, "current_price": 1993.0, "rate_y1": 2.38, "rate_y2": 2.38, "rate_y3": 2.38, "liquidation_value": 2119.0, "total_return_pct": 6.32, "annualized_return_pct": 2.23, "rate_source": "KSFC"}];
const KSFC = {"rate": 2.38, "date": "2026-05-27"};
const UPDATED = "2026-05-27 17:19";

let sortKey = "days_until_liquidation";
let sortAsc = true;
let view = [...DATA];

function fmt(v, type) {
  if (v === null || v === undefined || v === "") return "—";
  if (type === "int") return Number(v).toLocaleString();
  if (type === "money") return Number(v).toLocaleString(undefined, {maximumFractionDigits: 1});
  if (type === "pct") {
    const n = Number(v);
    return (n >= 0 ? "+" : "") + n.toFixed(2);
  }
  if (type === "rate") return Number(v).toFixed(2);
  return v;
}

function renderMeta() {
  const ksfcMsg = KSFC.rate !== null
    ? `KSFC 12개월 금리: <b>${KSFC.rate}%</b> (${KSFC.date || "기준일 없음"})`
    : `KSFC 금리 미설정`;
  document.getElementById("meta").innerHTML =
    `최종 갱신: <b>${UPDATED}</b> · ${ksfcMsg}`;
}

function renderStats() {
  const total = DATA.length;
  const imminent = DATA.filter(r => r.days_until_liquidation !== null && r.days_until_liquidation <= 90).length;
  const yields = DATA.map(r => r.annualized_return_pct).filter(v => v !== null && !isNaN(v));
  const maxY = yields.length ? Math.max(...yields).toFixed(2) : "—";
  const avgY = yields.length ? (yields.reduce((a,b) => a+b, 0) / yields.length).toFixed(2) : "—";

  document.getElementById("stats").innerHTML = `
    <div class="stat"><div class="label">총 종목 수</div><div class="value">${total}개</div></div>
    <div class="stat"><div class="label">⚠️ 청산임박 (90일↓)</div><div class="value">${imminent}개</div></div>
    <div class="stat"><div class="label">최고 연환산 수익률</div><div class="value">${maxY}%</div></div>
    <div class="stat"><div class="label">평균 연환산 수익률</div><div class="value">${avgY}%</div></div>
  `;
}

function applyFilters() {
  const q = document.getElementById("search").value.trim();
  const hideNoRate = document.getElementById("hideNoRate").checked;
  const onlyPos = document.getElementById("onlyPositive").checked;
  const imminentOnly = document.getElementById("imminentOnly").checked;

  view = DATA.filter(r => {
    if (q && !(r.name || "").includes(q)) return false;
    if (hideNoRate && (r.rate_y1 === null || r.rate_y1 === undefined)) return false;
    if (onlyPos && !(r.annualized_return_pct > 0)) return false;
    if (imminentOnly && !(r.days_until_liquidation !== null && r.days_until_liquidation <= 180)) return false;
    return true;
  });
  sortAndRender();
}

function sortAndRender() {
  view.sort((a, b) => {
    let av = a[sortKey], bv = b[sortKey];
    if (av === null || av === undefined) av = sortAsc ? Infinity : -Infinity;
    if (bv === null || bv === undefined) bv = sortAsc ? Infinity : -Infinity;
    if (typeof av === "number" && typeof bv === "number") return sortAsc ? av - bv : bv - av;
    av = String(av); bv = String(bv);
    return sortAsc ? av.localeCompare(bv) : bv.localeCompare(av);
  });

  document.querySelectorAll("th").forEach(th => {
    th.classList.remove("sort-asc", "sort-desc");
    const arr = th.querySelector(".arrow");
    if (arr) arr.textContent = "↕";
    if (th.dataset.key === sortKey) {
      th.classList.add(sortAsc ? "sort-asc" : "sort-desc");
      if (arr) arr.textContent = sortAsc ? "↑" : "↓";
    }
  });

  const tbody = document.getElementById("tbody");
  tbody.innerHTML = view.map(r => {
    const days = r.days_until_liquidation;
    let daysClass = "";
    if (days !== null && days !== undefined) {
      if (days <= 90) daysClass = "days-red";
      else if (days <= 180) daysClass = "days-yellow";
    }
    const ann = r.annualized_return_pct;
    let yieldClass = "";
    if (ann !== null && ann !== undefined) {
      if (ann >= 5) yieldClass = "yield-high";
      else if (ann >= 3) yieldClass = "yield-mid";
      else if (ann < 0) yieldClass = "yield-neg";
    }
    const sourceClass = r.rate_source ? `source-${r.rate_source}` : "";

    return `<tr>
      <td>${r.ticker || ""}</td>
      <td>${r.name || ""}</td>
      <td class="center">${r.payment_date || "—"}</td>
      <td class="center">${r.estimated_liquidation_date || "—"}</td>
      <td class="center ${daysClass}">${days !== null && days !== undefined ? days.toLocaleString() : "—"}</td>
      <td class="numeric">${fmt(r.offering_price, "int")}</td>
      <td class="numeric">${fmt(r.current_price, "int")}</td>
      <td class="numeric">${fmt(r.rate_y1, "rate")}</td>
      <td class="numeric">${fmt(r.rate_y2, "rate")}</td>
      <td class="numeric">${fmt(r.rate_y3, "rate")}</td>
      <td class="numeric">${fmt(r.liquidation_value, "money")}</td>
      <td class="numeric ${yieldClass}">${fmt(r.total_return_pct, "pct")}</td>
      <td class="numeric ${yieldClass}">${fmt(r.annualized_return_pct, "pct")}</td>
      <td class="center"><span class="${sourceClass}">${r.rate_source || "—"}</span></td>
    </tr>`;
  }).join("");

  document.getElementById("count").textContent = `${view.length} / ${DATA.length} 개`;
}

document.querySelectorAll("th").forEach(th => {
  if (!th.dataset.key) return;
  th.addEventListener("click", () => {
    if (sortKey === th.dataset.key) sortAsc = !sortAsc;
    else { sortKey = th.dataset.key; sortAsc = true; }
    sortAndRender();
  });
});
document.getElementById("search").addEventListener("input", applyFilters);
document.getElementById("hideNoRate").addEventListener("change", applyFilters);
document.getElementById("onlyPositive").addEventListener("change", applyFilters);
document.getElementById("imminentOnly").addEventListener("change", applyFilters);

renderMeta();
renderStats();
sortAndRender();
</script>
</body>
</html>
